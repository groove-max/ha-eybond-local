# The canonical suite runner is `python3 tools/quality_gate.py` (unittest
# discover). This file exists so that a bare `pytest tests/` ALSO works:
# ~12 edge-test modules install fake `homeassistant.*` packages into
# sys.modules at import time, which detonates the auto-loaded
# pytest-homeassistant-custom-component plugin (the fakes have no __path__,
# so `import homeassistant.helpers.script` fails for every later test).
# The suite is 100% unittest and uses neither that plugin nor syrupy.
[pytest]
addopts = -p no:homeassistant -p no:syrupy
